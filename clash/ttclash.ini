;设置分组标志位
custom_proxy_group=🚀 国外流量`select`[]♻️ 自动选择`[]👌WorkerIPV6`[]🔯 故障转移`(^(?!.*(电信|联通|移动)).*)
custom_proxy_group=👌WorkerIPV6`fallback`(MVless|MTrojan2|TTA)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=✅ 国内直连`select`[]DIRECT`(电信|联通|移动)`[]🚀 国外流量`[]👌WorkerIPV6`.*
custom_proxy_group=📹 YouTube`select`[]👌WorkerIPV6`[]🚀 国外流量`.*
;custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]✅ 国内直连`[]🚀 国外流量
custom_proxy_group=♻️ 自动选择`fallback`(^(?!.*(电信|联通|移动)).*)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 故障转移`fallback`(^(?!.*(电信|联通|移动)).*)`http://www.gstatic.com/generate_204`300,,50
